{% extends "base.html" %}

{% block title %}Transactions{% endblock %}

{% block content %}
<section class="transactions-shell">
    <h1>Transactions</h1>
    <p>Add receipts, paychecks, and other account activity.</p>

    <form class="transaction-form" action="{{ url_for('main.create_transaction') }}" method="post">
        <label for="transaction-name">Name</label>
        <input id="transaction-name" name="name" type="text" placeholder="Tesco Groceries" required>

        <label for="transaction-date">Date</label>
        <input id="transaction-date" name="date" type="date" required>

        <label for="transaction-amount">Amount</label>
        <input id="transaction-amount" name="amount" type="number" step="0.01" min="0.01" placeholder="0.00" required>

        <label for="transaction-type">Transaction type</label>
        <select id="transaction-type" name="transaction_type" required>
            <option value="" disabled selected>Select debit or credit</option>
            <option value="debit">Debit</option>
            <option value="credit">Credit</option>
        </select>

        <label for="transaction-genre">Genre</label>
        <select id="transaction-genre" name="genre" required>
            <option value="" disabled selected>Select a genre</option>
            <option value="food">Food</option>
            <option value="entertainment">Entertainment</option>
            <option value="transport">Transport</option>
            <option value="utilities">Utilities</option>
            <option value="housing">Housing</option>
            <option value="salary">Salary</option>
            <option value="other">Other</option>
        </select>

        <button type="submit">Save transaction</button>
    </form>

</section>
{% endblock %}
