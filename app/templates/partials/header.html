<header>
    <a class="logo" href="{{ url_for('main.home') }}" aria-label="Home">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Plutus logo">
    </a>

    <nav>
        {% if session.get('user_id') %}
            <a class="nav-trigger" href="{{ url_for('main.transactions_page') }}">Transactions</a>
            <a class="nav-trigger" href="{{ url_for('main.bank_import_page') }}">Bank Import</a>
            <a class="nav-trigger" href="{{ url_for('main.reconcile_page') }}">Reconcile</a>
            <a class="nav-trigger" href="{{ url_for('main.record_viewer_page') }}">Record Viewer</a>
            {% if session.get('is_admin') %}
                <a class="nav-trigger" href="{{ url_for('main.settings_page') }}">Settings</a>
            {% endif %}
            <a class="nav-trigger" href="{{ url_for('main.logout') }}">Log out</a>
        {% else %}
            <!-- Simple hover dropdowns for auth -->
            <div class="nav-menu">
                <a class="nav-trigger">Log in</a>
                {% include "prelogin/login.html" %}
            </div>
            <div class="nav-menu">
                <a class="nav-trigger">Sign up</a>
                {% include "prelogin/signup.html" %}
            </div>
        {% endif %}
    </nav>
</header>
