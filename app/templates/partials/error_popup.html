{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-popup-wrap">
        {% for category, message in messages %}
            <div class="flash-popup {% if category == 'success' %}flash-popup-success{% else %}flash-popup-error{% endif %}">
                <p>{{ message }}</p>
            </div>
        {% endfor %}
    </div>
    {% endif %}
{% endwith %}
